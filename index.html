<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA-Prep-Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ==========================================
         ZONE 1: GOALS & MOTIVATIONAL DASHBOARD
         ========================================== -->
    <header id="dashboard">
        <div class="dash-header-top">
            <!-- Added Web App Title -->
            <h2><i class="fas fa-laptop-code"></i> DSA-Prep-Tracker</h2>
            <div>
                <button id="toggle-charts-btn" class="icon-btn" title="Toggle Insights"><i
                        class="fas fa-chart-pie"></i></button>
                <button id="theme-toggle" class="icon-btn" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
            </div>
        </div>

        <div id="goal-view-mode" class="goal-container">
            <div class="motivational-area">
                <h3 id="motivation-msg">Loading...</h3>
                <p class="streak-text"><i class="fas fa-fire"></i> Streak: <span id="streak-msg">0</span> Days</p>
                <!-- Added text to clarify daily requirement for weekly/monthly goals -->
                <p id="daily-req-txt" style="font-size: 11px; color: var(--text-muted); margin-top: 5px;"></p>
            </div>

            <div class="progress-area">
                <div class="progress-bar-wrapper">
                    <label for="progress-bar">Progress:</label>
                    <progress id="progress-bar" value="0" max="100"></progress>
                    <span id="progress-text">0 / 0</span>
                </div>
                <button id="edit-goal-btn" class="icon-btn" title="Edit Goal"><i class="fas fa-ellipsis-v"></i></button>
            </div>
        </div>

        <div id="goal-edit-mode" class="goal-container" style="display: none;">
            <div class="edit-inputs">
                <label for="goal-type">Goal Type:</label>
                <select id="goal-type">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>
                <label for="goal-target">Target Problems:</label>
                <input type="number" id="goal-target" min="1" placeholder="e.g., 5">
            </div>
            <button id="save-goal-btn" class="btn-success"><i class="fas fa-check"></i> Save Goal</button>
        </div>

        <!-- INSIGHTS PANEL -->
        <div id="insights-panel" class="smooth-collapse">
            <div class="collapse-inner insights-content">

                <div class="insights-header">
                    <!-- Added Stats to Insights -->
                    <div class="insight-stats">
                        <span class="stat-badge"><i class="fas fa-check-double"></i> Total Solved: <b
                                id="insight-total">0</b></span>
                        <span class="stat-badge"><i class="fas fa-stopwatch"></i> Avg Time: <b
                                id="insight-avg">0m</b></span>
                    </div>
                    <!-- Added Chart Filters -->
                    <div class="chart-controls">
                        <select id="chart-platform">
                            <option value="All">All Platforms</option>
                            <option value="LeetCode">LeetCode</option>
                            <option value="Codeforces">Codeforces</option>
                        </select>
                        <select id="chart-time">
                            <option value="all">All Time</option>
                            <option value="7">Last 7 Days</option>
                            <option value="30">Last 30 Days</option>
                        </select>
                        <select id="chart-type">
                            <option value="doughnut">Pie Chart</option>
                            <option value="bar">Bar Graph</option>
                        </select>
                    </div>
                </div>

                <!-- Added Empty State -->
                <div id="insights-empty-state" style="text-align: center; padding: 30px; color: var(--text-muted);">
                    <i class="fas fa-chart-bar" style="font-size: 30px; margin-bottom: 10px;"></i>
                    <p>Log a problem to see insights!</p>
                </div>

                <div id="insights-charts-wrapper" class="charts-row">
                    <div class="chart-wrapper"><canvas id="difficultyChart"></canvas></div>
                    <div class="chart-wrapper"><canvas id="timeChart"></canvas></div>
                    <div class="chart-wrapper"><canvas id="tagChart"></canvas></div>
                </div>
            </div>
        </div>
    </header>

    <hr>

    <div class="main-container">
        <!-- LEFT: FORM -->
        <aside class="form-panel">
            <h2 id="form-title">Log a Problem</h2>
            <form id="tracker-form" class="compact-form">

                <!-- Hidden Input for Editing -->
                <input type="hidden" id="edit-id" value="">

                <div class="form-group row-group">
                    <input type="url" id="problem-link" placeholder="Paste URL here...">
                    <button type="button" id="autofill-btn">Auto-Fill</button>
                </div>

                <div class="form-group row-group">
                    <input type="date" id="date" required>
                    <select id="platform">
                        <option value="LeetCode">LeetCode</option>
                        <option value="Codeforces">Codeforces</option>
                        <option value="GeeksforGeeks">GeeksforGeeks</option>
                        <option value="HackerRank">HackerRank</option>
                        <option value="CodeChef">CodeChef</option>
                        <option value="HackerEarth">HackerEarth</option>
                    </select>
                </div>

                <div class="form-group row-group">
                    <input type="text" id="problem-name" required placeholder="Problem Name/Number">
                    <!-- Datalist allows typing CF Ratings or selecting Easy/Medium/Hard -->
                    <input list="diff-list" id="difficulty" placeholder="Diff/Rating" required>
                    <datalist id="diff-list">
                        <option value="Easy">
                        <option value="Medium">
                        <option value="Hard">
                    </datalist>
                </div>

                <div class="form-group tags-wrapper">
                    <div id="selected-tags" class="selected-tags"></div>
                    <select id="tag-dropdown">
                        <option value="" disabled selected>Select or type a tag...</option>
                        <option value="Array">Array</option>
                        <option value="Backtracking">Backtracking</option>
                        <option value="Binary Search">Binary Search</option>
                        <option value="Bitmask">Bitmask</option>
                        <option value="BFS">BFS</option>
                        <option value="Bruteforce">Bruteforce</option>
                        <option value="BST">BST</option>
                        <option value="Combinatorics">Combinatorics</option>
                        <option value="DFS">DFS</option>
                        <option value="Divide&Conquer">Divide&Conquer</option>
                        <option value="DP">DP</option>
                        <option value="Graph">Graph</option>
                        <option value="Hash Map">Hash Map</option>
                        <option value="Heap">Heap</option>
                        <option value="Linked-List">Linked-List</option>
                        <option value="Math">Math</option>
                        <option value="Matrix">Matrix</option>
                        <option value="Memoization">Memoization</option>
                        <option value="Monotonic-Stack">Monotonic-Stack</option>
                        <option value="MST">MST</option>
                        <option value="Number-theory">Number-theory</option>
                        <option value="Prefix-Sum">Prefix-Sum</option>
                        <option value="Queue">Queue</option>
                        <option value="Recursion">Recursion</option>
                        <option value="Segment-Tree">Segment-Tree</option>
                        <option value="Shortest-Path">Shortest-Path</option>
                        <option value="Sliding-window">Sliding-window</option>
                        <option value="Sorting">Sorting</option>
                        <option value="String">String</option>
                        <option value="Stack">Stack</option>
                        <option value="Suffix">Suffix</option>
                        <option value="Tree">Tree</option>
                        <option value="Trie">Trie</option>
                        <option value="Two-Pointers">Two-Pointers</option>
                        <option value="Union-Find">Union-Find</option>
                    </select>
                </div>

                <div class="form-group row-group stopwatch-container">
                    <span id="timer-display">00:00</span>
                    <button type="button" id="start-timer" class="action-btn" title="Start/Resume"><i
                            class="fas fa-play"></i></button>
                    <button type="button" id="pause-timer" class="action-btn" title="Pause"><i
                            class="fas fa-pause"></i></button>
                    <button type="button" id="save-timer" class="action-btn" title="Save Time"><i
                            class="fas fa-save"></i></button>
                    <input type="number" id="time-taken" placeholder="Time (mins)">
                </div>

                <!-- Smooth Collapse for Notes -->
                <button type="button" id="toggle-notes-btn"
                    style="background:none; color:var(--text-muted); border:none; cursor:pointer; text-align:left; padding:5px 0;">
                    <i class="fas fa-chevron-down"></i> Add Notes
                </button>
                <div id="notes-section" class="smooth-collapse">
                    <div class="collapse-inner" style="display:flex; flex-direction:column; gap:8px; padding-top:5px;">
                        <select id="took-help">
                            <option value="None">No help taken</option>
                            <option value="Editorial">Read Editorial</option>
                            <option value="Video">Watched Video</option>
                        </select>
                        <textarea id="initial-idea" rows="2" placeholder="Initial Idea..."></textarea>
                        <textarea id="missed-points" rows="2" placeholder="Missed Key Points / Mistakes..."></textarea>
                        <textarea id="trick-used" rows="2" placeholder="Core Trick / Pattern..."></textarea>
                    </div>
                </div>

                <div class="form-group status-container">
                    <input type="radio" id="status-red" name="revision-status" value="red" required>
                    <label for="status-red"><span class="emoji">🔴</span><span class="status-txt">Must
                            Revise</span></label>
                    <input type="radio" id="status-yellow" name="revision-status" value="yellow">
                    <label for="status-yellow"><span class="emoji">🟡</span><span class="status-txt">Needs
                            Work</span></label>
                    <input type="radio" id="status-green" name="revision-status" value="green" checked>
                    <label for="status-green"><span class="emoji">🟢</span><span
                            class="status-txt">Mastered</span></label>
                </div>

                <div class="form-group row-group">
                    <button type="submit" id="save-btn" style="flex: 2;">Save Problem</button>
                    <button type="button" id="cancel-edit-btn"
                        style="display: none; background: #64748b; flex: 1;">Cancel</button>
                </div>
            </form>
        </aside>

        <!-- RIGHT: HISTORY TABLE -->
        <section class="history-panel">
            <div class="history-header">
                <h2>Previously Logged</h2>
            </div>
            <!-- Advanced Filter Controls -->
            <div class="table-controls" style="flex-direction: column;">
                <!-- Row 1: Core Filters -->
                <div style="display: flex; gap: 10px; width: 100%; flex-wrap: wrap;">
                    <input type="text" id="search-filter" placeholder="Search problem name...">
                    <select id="platform-filter">
                        <option value="All">All Platforms</option>
                        <option value="LeetCode">LeetCode</option>
                        <option value="Codeforces">Codeforces</option>
                        <option value="GeeksforGeeks">GeeksforGeeks</option>
                        <option value="HackerRank">HackerRank</option>
                        <option value="CodeChef">CodeChef</option>
                        <option value="HackerEarth">HackerEarth</option>
                    </select>
                    <input type="text" id="diff-filter" placeholder="Diff/Rating (e.g. Hard, 800)">
                    <select id="status-filter">
                        <option value="All">All Statuses</option>
                        <option value="🔴">🔴 Must Revise</option>
                        <option value="🟡">🟡 Needs Work</option>
                        <option value="🟢">🟢 Mastered</option>
                    </select>
                    <select id="sort-filter">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="duration-desc">Duration: High to Low</option>
                    </select>
                </div>
                <!-- Row 2: Multi-Tag Filter -->
                <div style="display: flex; gap: 10px; width: 100%; align-items: center;">
                    <select id="filter-tag-dropdown" style="max-width: 200px;">
                        <option value="" disabled selected>Filter by tags...</option>
                        <<option value="Array">Array</option>
                        <option value="Backtracking">Backtracking</option>
                        <option value="Binary Search">Binary Search</option>
                        <option value="Bitmask">Bitmask</option>
                        <option value="BFS">BFS</option>
                        <option value="Bruteforce">Bruteforce</option>
                        <option value="BST">BST</option>
                        <option value="Combinatorics">Combinatorics</option>
                        <option value="DFS">DFS</option>
                        <option value="Divide&Conquer">Divide&Conquer</option>
                        <option value="DP">DP</option>
                        <option value="Graph">Graph</option>
                        <option value="Hash Map">Hash Map</option>
                        <option value="Heap">Heap</option>
                        <option value="Linked-List">Linked-List</option>
                        <option value="Math">Math</option>
                        <option value="Matrix">Matrix</option>
                        <option value="Memoization">Memoization</option>
                        <option value="Monotonic-Stack">Monotonic-Stack</option>
                        <option value="MST">MST</option>
                        <option value="Number-theory">Number-theory</option>
                        <option value="Prefix-Sum">Prefix-Sum</option>
                        <option value="Queue">Queue</option>
                        <option value="Recursion">Recursion</option>
                        <option value="Segment-Tree">Segment-Tree</option>
                        <option value="Shortest-Path">Shortest-Path</option>
                        <option value="Sliding-window">Sliding-window</option>
                        <option value="Sorting">Sorting</option>
                        <option value="String">String</option>
                        <option value="Stack">Stack</option>
                        <option value="Suffix">Suffix</option>
                        <option value="Tree">Tree</option>
                        <option value="Trie">Trie</option>
                        <option value="Two-Pointers">Two-Pointers</option>
                        <option value="Union-Find">Union-Find</option>
                    </select>
                    <div id="active-filter-tags" class="selected-tags" style="margin-bottom: 0;"></div>
                </div>
            </div>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Platform</th>
                            <th>Problem</th>
                            <th>Diff/Rating</th>
                            <th>Tags</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody><!-- JS --></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
